<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Al-Waseel Farm logo</title>
  <desc id="desc">Premium Al-Waseel Farm bilingual brand mark in deep green, sand gold, and cream.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E7D29A"/>
      <stop offset="0.52" stop-color="#C8A96E"/>
      <stop offset="1" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4A6741"/>
      <stop offset="1" stop-color="#1E2D1A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="900" height="900" rx="220" fill="#F7F0E3"/>
  <rect x="44" y="44" width="812" height="812" rx="188" fill="none" stroke="url(#gold)" stroke-width="20"/>
  <rect x="82" y="82" width="736" height="736" rx="158" fill="none" stroke="#C8A96E" stroke-width="4" opacity="0.55"/>

  <g filter="url(#shadow)">
    <path d="M202 598 C270 526 318 520 384 564 C432 596 490 607 548 576 C602 547 658 535 708 568 L708 642 L202 642 Z" fill="url(#gold)" opacity="0.92"/>
    <path d="M236 590 L236 526 L272 526 L272 558 L306 558 L306 494 L352 494 L352 564 L392 564 L392 516 L444 516 L444 570 L489 570 L489 498 L537 498 L537 558 L590 558 L590 510 L634 510 L634 585" fill="none" stroke="#8B6914" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <text x="450" y="330" text-anchor="middle" direction="rtl" unicode-bidi="bidi-override" font-family="Tahoma, 'Segoe UI', Arial, sans-serif" font-size="116" font-weight="800" fill="#1E2D1A">الوصيل</text>
  <text x="450" y="228" text-anchor="middle" direction="rtl" unicode-bidi="bidi-override" font-family="Tahoma, 'Segoe UI', Arial, sans-serif" font-size="44" font-weight="600" fill="#1E2D1A" opacity="0.82">مزرعة</text>
  <text x="450" y="404" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="39" font-weight="700" letter-spacing="8" fill="#4A6741">ALWASEEL FARM</text>
  <line x1="260" y1="448" x2="640" y2="448" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>
  <text x="450" y="706" text-anchor="middle" direction="rtl" unicode-bidi="bidi-override" font-family="Tahoma, 'Segoe UI', Arial, sans-serif" font-size="34" font-weight="700" fill="#1E2D1A">الدرعية · الرياض</text>
</svg>
