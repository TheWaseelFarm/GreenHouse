
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Mizān — redesign concept</title>
<style>
  :root{
    --bg:#0A0F1C;
    --surface:#111A30;
    --surface-2:#16223E;
    --raise:#1A2848;
    --line:rgba(255,255,255,.07);
    --line-2:rgba(255,255,255,.13);
    --ink:#E6ECF7;
    --muted:#8D9AB4;
    --faint:#5C6b86;
    --gold:#D9B450;
    --gold-soft:rgba(217,180,80,.14);
    --clean:#3ECB86;
    --purify:#F3B24A;
    --fail:#F0625A;
    --clean-soft:rgba(62,203,134,.14);
    --purify-soft:rgba(243,178,74,.14);
    --fail-soft:rgba(240,98,90,.14);
    --shadow:0 18px 44px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{background:#05070E;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;justify-content:center;}
  .app{width:100%;max-width:460px;height:100dvh;min-height:100dvh;position:relative;overflow:hidden;
    background:radial-gradient(120% 60% at 50% -10%,rgba(217,180,80,.10),transparent 60%),linear-gradient(180deg,#0C1424 0%,#080D18 100%);
    border-left:1px solid var(--line);border-right:1px solid var(--line);}
 
  /* ---- panels / stack navigation ---- */
  .panel{position:absolute;inset:0;display:flex;flex-direction:column;background:transparent;}
  #detail{transform:translateX(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);z-index:25;
    background:linear-gradient(180deg,#0C1424 0%,#080D18 100%);}
  #detail.open{transform:translateX(0);}
 
  .topbar{flex:0 0 auto;height:58px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;
    background:rgba(10,15,28,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);z-index:20;}
  .brand{display:flex;align-items:center;gap:9px;}
  .mark{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
    background:radial-gradient(circle at 50% 30%,#1c2b4c,#0a1120);border:1px solid rgba(217,180,80,.5);box-shadow:inset 0 0 10px rgba(217,180,80,.15);}
  .brand b{font-size:16px;letter-spacing:.5px;font-weight:800;color:#EBD79A;}
  .top-actions{display:flex;gap:8px;}
  .icon-btn{width:38px;height:38px;border:0;border-radius:11px;display:grid;place-items:center;background:rgba(255,255,255,.05);color:var(--ink);cursor:pointer;font-size:15px;border:1px solid var(--line);}
  .icon-btn:active{transform:scale(.94);}
 
  .scroll{flex:1;min-height:0;overflow-y:auto;scrollbar-width:none;}
  .scroll::-webkit-scrollbar{display:none;}
 
  /* ---- hero balance ---- */
  .hero{padding:18px 16px 6px;}
  .hero .eyebrow{display:flex;align-items:center;justify-content:space-between;color:var(--faint);font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;}
  .hero h1{margin:9px 0 2px;font-size:30px;font-weight:820;letter-spacing:-.8px;}
  .hero h1 span{color:var(--muted);font-size:15px;font-weight:700;letter-spacing:0;}
  .balance{margin-top:16px;}
  .balance-track{height:14px;border-radius:8px;overflow:hidden;display:flex;background:var(--surface);border:1px solid var(--line);position:relative;}
  .balance-track i{display:block;height:100%;}
  .b-clean{background:linear-gradient(90deg,#34b978,#43d692);}
  .b-purify{background:linear-gradient(90deg,#e7a63b,#f6bd5a);}
  .b-fail{background:linear-gradient(90deg,#e15750,#f26f68);}
  .fulcrum{position:absolute;top:-4px;bottom:-4px;left:50%;width:2px;transform:translateX(-50%);background:rgba(255,255,255,.28);border-radius:2px;}
  .legend{margin-top:12px;display:flex;gap:16px;}
  .legend div{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);font-weight:650;}
  .legend b{color:var(--ink);font-weight:820;}
  .dot{width:9px;height:9px;border-radius:50%;}
  .dot.c{background:var(--clean);} .dot.p{background:var(--purify);} .dot.f{background:var(--fail);}
 
  .segment{position:sticky;top:0;z-index:15;padding:14px 16px 12px;background:linear-gradient(180deg,rgba(10,15,28,.96),rgba(10,15,28,.82));backdrop-filter:blur(10px);display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
  .segment::-webkit-scrollbar{display:none;}
  .seg{flex:0 0 auto;padding:9px 15px;border-radius:999px;border:1px solid var(--line-2);background:var(--surface);color:var(--muted);font-size:13px;font-weight:750;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap;transition:.15s;}
  .seg .dot{width:8px;height:8px;}
  .seg.active{color:#0A0F1C;background:var(--ink);border-color:var(--ink);}
  .seg[data-v="clean"].active{background:var(--clean);border-color:var(--clean);}
  .seg[data-v="purify"].active{background:var(--purify);border-color:var(--purify);}
  .seg[data-v="fail"].active{background:var(--fail);border-color:var(--fail);}
 
  .list-head{padding:6px 18px 10px;display:flex;align-items:baseline;justify-content:space-between;}
  .list-head h2{font-size:13px;font-weight:800;letter-spacing:.3px;color:var(--muted);text-transform:uppercase;}
  .list-head span{font-size:12px;color:var(--faint);font-weight:650;}
 
  .list{padding:0 14px 26px;display:flex;flex-direction:column;gap:10px;}
  .card{position:relative;border-radius:20px;padding:15px 15px 14px 18px;background:linear-gradient(180deg,var(--surface),#0F1830);border:1px solid var(--line);cursor:pointer;transition:transform .14s,border-color .14s;}
  .card:active{transform:scale(.985);border-color:var(--line-2);}
  .card::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;background:var(--faint);}
  .card.clean::before{background:var(--clean);}
  .card.purify::before{background:var(--purify);}
  .card.fail::before{background:var(--fail);}
  .c-top{display:flex;align-items:center;gap:10px;}
  .avatar{width:34px;height:34px;border-radius:10px;flex:0 0 auto;display:grid;place-items:center;font-size:11px;font-weight:820;color:var(--muted);background:var(--surface-2);border:1px solid var(--line-2);}
  .avatar.fund{color:var(--gold);background:var(--gold-soft);border-color:rgba(217,180,80,.3);}
  .c-who{min-width:0;flex:1;}
  .c-who b{display:block;font-size:13px;font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .c-who span{font-size:11.5px;color:var(--faint);}
  .c-time{font-size:11.5px;color:var(--faint);font-weight:650;flex:0 0 auto;}
  .c-mid{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-top:12px;}
  .c-ticker{font-size:25px;font-weight:850;letter-spacing:-.8px;line-height:1;}
  .c-co{margin-top:4px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px;}
  .badge{flex:0 0 auto;padding:8px 12px;border-radius:12px;font-size:12px;font-weight:820;display:flex;align-items:center;gap:6px;white-space:nowrap;}
  .badge.clean{color:var(--clean);background:var(--clean-soft);}
  .badge.purify{color:var(--purify);background:var(--purify-soft);}
  .badge.fail{color:var(--fail);background:var(--fail-soft);}
  .c-meta{margin-top:13px;padding-top:12px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center;font-size:11.5px;color:var(--muted);font-weight:600;}
  .side{padding:4px 9px;border-radius:8px;background:var(--surface-2);border:1px solid var(--line-2);font-weight:750;font-size:11px;letter-spacing:.2px;color:var(--ink);}
  .side.sell{color:var(--gold);background:var(--gold-soft);border-color:rgba(217,180,80,.25);}
  .sep{color:var(--faint);}
  .chev{margin-left:auto;color:var(--faint);font-size:15px;}
 
  /* ---- bottom tabs ---- */
  .tabs{flex:0 0 auto;height:74px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(4,1fr);gap:4px;background:rgba(9,13,24,.92);backdrop-filter:blur(16px);border-top:1px solid var(--line);z-index:20;}
  .tab{border:0;background:transparent;color:var(--faint);display:grid;place-items:center;gap:3px;font-size:10.5px;font-weight:750;cursor:pointer;border-radius:14px;}
  .tab .ti{font-size:18px;line-height:1;}
  .tab.active{color:var(--gold);}
 
  /* ---- filter sheet ---- */
  .scrim{position:absolute;inset:0;background:rgba(4,7,14,.6);opacity:0;pointer-events:none;transition:.2s;z-index:30;}
  .scrim.open{opacity:1;pointer-events:auto;}
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:31;transform:translateY(100%);transition:transform .26s cubic-bezier(.32,.72,0,1);background:linear-gradient(180deg,#13203A,#0C1424);border-top:1px solid var(--line-2);border-radius:26px 26px 0 0;padding:10px 18px calc(20px + env(safe-area-inset-bottom));box-shadow:var(--shadow);}
  .sheet.open{transform:translateY(0);}
  .grab{width:40px;height:4px;border-radius:3px;background:var(--line-2);margin:4px auto 14px;}
  .sheet h3{margin:0 0 4px;font-size:17px;font-weight:820;}
  .sheet .sub{margin:0 0 16px;font-size:12.5px;color:var(--muted);}
  .field{height:44px;border-radius:13px;background:var(--surface);border:1px solid var(--line-2);display:flex;align-items:center;gap:9px;padding:0 13px;color:var(--faint);margin-bottom:16px;}
  .field input{border:0;background:transparent;color:var(--ink);width:100%;outline:0;font-size:14px;}
  .flabel{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--faint);margin:0 0 8px;}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .chip{padding:9px 14px;border-radius:999px;background:var(--surface);border:1px solid var(--line-2);color:var(--muted);font-size:12.5px;font-weight:700;cursor:pointer;}
  .chip.on{color:#0A0F1C;background:var(--gold);border-color:var(--gold);}
  .apply{width:100%;height:50px;border:0;border-radius:15px;background:var(--gold);color:#1a1204;font-size:15px;font-weight:850;cursor:pointer;margin-top:4px;}
 
  /* ---- DETAIL screen ---- */
  .d-head{flex:0 0 auto;height:58px;padding:0 8px 0 6px;display:flex;align-items:center;gap:6px;background:rgba(10,15,28,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);z-index:20;}
  .back{width:44px;height:44px;border:0;background:transparent;color:var(--ink);font-size:26px;cursor:pointer;border-radius:12px;}
  .back:active{background:rgba(255,255,255,.06);}
  .d-head .d-tk{font-size:15px;font-weight:820;letter-spacing:-.2px;}
  .d-head .badge{margin-left:auto;margin-right:6px;padding:6px 11px;font-size:11.5px;}
  .d-scroll{flex:1;min-height:0;overflow-y:auto;scrollbar-width:none;padding:16px 16px 30px;}
  .d-scroll::-webkit-scrollbar{display:none;}
  .d-hero .eyebrow{color:var(--faint);font-size:11.5px;font-weight:750;}
  .d-hero .d-big{font-size:42px;font-weight:860;letter-spacing:-1.4px;line-height:1;margin-top:8px;}
  .d-hero .d-co{margin-top:6px;color:var(--muted);font-size:14px;}
  .d-hero .d-line{margin-top:14px;display:flex;gap:8px;align-items:center;font-size:12.5px;color:var(--muted);font-weight:600;flex-wrap:wrap;}
 
  .sect{margin-top:18px;border-radius:20px;background:var(--surface);border:1px solid var(--line);overflow:hidden;}
  .sect-h{padding:14px 16px 4px;display:flex;align-items:center;justify-content:space-between;}
  .sect-h h3{font-size:14px;font-weight:820;letter-spacing:.2px;}
  .sect-h em{font-style:normal;color:var(--faint);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;}
  .row{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:14px;border-top:1px solid var(--line);}
  .row:first-of-type{border-top:0;}
  .row small{color:var(--muted);font-size:12.5px;font-weight:650;}
  .row b{font-size:13px;font-weight:750;}
  .vchip{padding:6px 11px;border-radius:9px;font-size:11.5px;font-weight:800;}
  .vchip.pass{color:var(--clean);background:var(--clean-soft);}
  .vchip.watch{color:var(--purify);background:var(--purify-soft);}
  .vchip.fail{color:var(--fail);background:var(--fail-soft);}
  .meter-row{padding:13px 16px;border-top:1px solid var(--line);}
  .meter-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .meter-top small{color:var(--muted);font-size:12.5px;font-weight:650;}
  .meter-top b{font-size:13px;font-weight:800;}
  .meter{height:8px;border-radius:6px;background:var(--surface-2);overflow:hidden;}
  .meter i{display:block;height:100%;border-radius:6px;}
  .meter i.ok{background:var(--clean);}
  .meter i.warn{background:var(--purify);}
  .meter i.adv{background:linear-gradient(90deg,#5b6b90,#8391b0);}
  .adv-tag{color:var(--faint);font-size:11px;font-weight:700;}
  .why{padding:14px 16px 16px;border-top:1px solid var(--line);color:var(--muted);font-size:13px;line-height:1.55;}
  .facts{padding:6px 16px 14px;display:grid;grid-template-columns:1fr 1fr;gap:14px 12px;}
  .fact small{display:block;color:var(--faint);font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;}
  .fact b{display:block;margin-top:4px;font-size:13px;font-weight:750;}
  .disc{margin-top:16px;color:var(--faint);font-size:11px;line-height:1.5;text-align:center;padding:0 8px;}
 
  .concept-tag{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:40;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);background:rgba(0,0,0,.35);padding:3px 10px;border-radius:999px;pointer-events:none;}
</style>
</head>
<body>
  <div class="app">
    <div class="concept-tag" id="tag">Concept · Home</div>
 
    <!-- ============ HOME ============ -->
    <div class="panel" id="home">
      <div class="topbar">
        <div class="brand">
          <div class="mark">
            <svg viewBox="0 0 48 48" width="19" height="19" aria-hidden="true">
              <defs><linearGradient id="mzg" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#B98E2C"/><stop offset="1" stop-color="#F0D483"/></linearGradient></defs>
              <path d="M9 39 V15 L24 31 L39 15 V39" fill="none" stroke="url(#mzg)" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M33 7.4 l1.2 2.8 2.8 1.2 -2.8 1.2 L33 16.6 l-1.2 -2.8 -2.8 -1.2 2.8 -1.2 Z" fill="#F3E2B0"/>
            </svg>
          </div>
          <b>Mizān</b>
        </div>
        <div class="top-actions">
          <button class="icon-btn" onclick="openSheet()" aria-label="Filter">⚙</button>
          <button class="icon-btn" aria-label="Notifications">🔔</button>
        </div>
      </div>
 
      <div class="scroll">
        <div class="hero">
          <div class="eyebrow"><span>Today · 3 Jul</span><span>Screened live</span></div>
          <h1>66 <span>new disclosures</span></h1>
          <div class="balance">
            <div class="balance-track">
              <i class="b-clean" style="width:18%"></i><i class="b-purify" style="width:73%"></i><i class="b-fail" style="width:9%"></i>
              <span class="fulcrum"></span>
            </div>
            <div class="legend">
              <div><span class="dot c"></span><b>12</b> Clean</div>
              <div><span class="dot p"></span><b>48</b> Purify</div>
              <div><span class="dot f"></span><b>6</b> Fail</div>
            </div>
          </div>
        </div>
 
        <div class="segment" id="segment">
          <button class="seg active" data-v="all" onclick="setSeg(this)">All</button>
          <button class="seg" data-v="clean" onclick="setSeg(this)"><span class="dot c"></span>Clean</button>
          <button class="seg" data-v="purify" onclick="setSeg(this)"><span class="dot p"></span>Purify</button>
          <button class="seg" data-v="fail" onclick="setSeg(this)"><span class="dot f"></span>Fail</button>
        </div>
 
        <div class="list-head"><h2>Latest disclosures</h2><span id="count">66 shown</span></div>
        <div class="list" id="list"></div>
      </div>
 
      <nav class="tabs">
        <button class="tab active"><span class="ti">◈</span>Alerts</button>
        <button class="tab"><span class="ti">◎</span>Watchlist</button>
        <button class="tab"><span class="ti">✓</span>Verdicts</button>
        <button class="tab"><span class="ti">☰</span>More</button>
      </nav>
    </div>
 
    <!-- ============ DETAIL ============ -->
    <div class="panel" id="detail">
      <div class="d-head">
        <button class="back" onclick="closeDetail()" aria-label="Back">‹</button>
        <span class="d-tk" id="d-tk">—</span>
        <span class="badge" id="d-badge">—</span>
      </div>
      <div class="d-scroll" id="d-body"></div>
    </div>
 
    <!-- ============ SHEET ============ -->
    <div class="scrim" id="scrim" onclick="closeSheet()"></div>
    <div class="sheet" id="sheet">
      <div class="grab"></div>
      <h3>Filter & sort</h3>
      <p class="sub">Narrow the feed. Verdict is set by the pills above.</p>
      <div class="field"><span>⌕</span><input placeholder="Search ticker, company, or source" /></div>
      <p class="flabel">Trade side</p>
      <div class="chips"><span class="chip on">All</span><span class="chip">Buy</span><span class="chip">Sell</span></div>
      <p class="flabel">Source</p>
      <div class="chips"><span class="chip on">All</span><span class="chip">Officials</span><span class="chip">Funds</span></div>
      <p class="flabel">Sort by</p>
      <div class="chips"><span class="chip on">Newest</span><span class="chip">Amount</span><span class="chip">Biggest move</span></div>
      <button class="apply" onclick="closeSheet()">Show results</button>
    </div>
  </div>
 
<script>
  const vtext = {clean:"Clean", purify:"Purify-at-sale", fail:"Fail"};
  const vshort = {clean:"Clean", purify:"Purify", fail:"Fail"};
  const rows = [
    {who:"Renaissance Technologies",sub:"Institutional · 13F",init:"RT",fund:true,ticker:"NVDA",co:"NVIDIA Corp.",side:"Buy",amt:"$15K–$50K",when:"2d",tdate:"Jun 17, 2026",fdate:"Jun 25, 2026",v:"clean",biz:"Hardware, chips, AI infrastructure",bizS:"pass",impure:0,debt:3.2,why:"Permissible technology business with no impure income to purify and debt well within the advisory reference. A clean buy — nothing to purify at sale."},
    {who:"Public Official Filing",sub:"Officials · House PTR",init:"PO",fund:false,ticker:"AVGO",co:"Broadcom Inc.",side:"Buy",amt:"$50K–$100K",when:"2d",tdate:"Jun 15, 2026",fdate:"Jun 24, 2026",v:"purify",biz:"Semiconductors & infrastructure software",bizS:"watch",impure:1.4,debt:19,why:"Core business is permissible, but a small slice of revenue is non-operating/interest income. Buyable as Purify-at-sale; purify the impure portion of any gain when sold."},
    {who:"Top Growth Fund",sub:"Institutional · 13F",init:"TG",fund:true,ticker:"COST",co:"Costco Wholesale",side:"Buy",amt:"$1K–$15K",when:"3d",tdate:"Jun 09, 2026",fdate:"Jun 22, 2026",v:"purify",biz:"Retail — small non-compliant items",bizS:"watch",impure:2.3,debt:8.5,why:"Retail is generally permissible; a minor non-compliant revenue component applies. Buyable with a charity purification amount at sale."},
    {who:"Public Official Filing",sub:"Officials · Senate PTR",init:"PO",fund:false,ticker:"JPM",co:"JPMorgan Chase & Co.",side:"Sell",amt:"$50K–$100K",when:"3d",tdate:"Jun 11, 2026",fdate:"Jun 23, 2026",v:"fail",biz:"Conventional interest-based banking",bizS:"fail",impure:71,debt:0,why:"Excluded at the business-activity level: conventional banking and interest income are core to the model. Blocked before financial ratios matter."},
    {who:"Crescent Lake Capital",sub:"Institutional · 13F",init:"CL",fund:true,ticker:"META",co:"Meta Platforms Inc.",side:"Buy",amt:"18,900 sh",when:"4d",tdate:"Jun 03, 2026",fdate:"Jun 18, 2026",v:"purify",biz:"Digital advertising platform",bizS:"watch",impure:1.9,debt:1.5,why:"Primary business permissible; a small questionable revenue component flags it. Shown buyable with purification due at sale."},
    {who:"Global Value Fund",sub:"Institutional · 13F",init:"GV",fund:true,ticker:"TSM",co:"Taiwan Semiconductor",side:"Buy",amt:"$15K–$50K",when:"4d",tdate:"May 30, 2026",fdate:"Jun 20, 2026",v:"clean",biz:"Semiconductor manufacturing",bizS:"pass",impure:0,debt:6,why:"Permissible manufacturing business, no impure income, debt within the advisory reference. Clean — nothing to purify."},
    {who:"Public Official Filing",sub:"Officials · House PTR",init:"PO",fund:false,ticker:"XOM",co:"Exxon Mobil Corp.",side:"Sell",amt:"$15K–$50K",when:"5d",tdate:"Jun 02, 2026",fdate:"Jun 17, 2026",v:"purify",biz:"Energy production",bizS:"pass",impure:0,debt:52,why:"Permissible energy business with no impure income. Debt sits above the advisory reference — but under Framework B debt is advisory only and never disqualifies, so it stays Purify-at-sale, not Fail."},
    {who:"Northstar Quant Partners",sub:"Institutional · 13F",init:"NQ",fund:true,ticker:"BAC",co:"Bank of America Corp.",side:"Buy",amt:"$1K–$15K",when:"5d",tdate:"Jun 06, 2026",fdate:"Jun 19, 2026",v:"fail",biz:"Conventional banking",bizS:"fail",impure:68,debt:0,why:"Relevant as a signal, but excluded by the Sharia business screen due to conventional banking exposure."},
  ];
  let filter = "all";
 
  function card(r,i){
    return `<article class="card ${r.v}" onclick="openDetail(${i})">
      <div class="c-top">
        <div class="avatar ${r.fund?'fund':''}">${r.init}</div>
        <div class="c-who"><b>${r.who}</b><span>${r.sub}</span></div>
        <div class="c-time">${r.when}</div>
      </div>
      <div class="c-mid">
        <div><div class="c-ticker">${r.ticker}</div><div class="c-co">${r.co}</div></div>
        <div class="badge ${r.v}">${vshort[r.v]}</div>
      </div>
      <div class="c-meta">
        <span class="side ${r.side==='Sell'?'sell':''}">Disclosed ${r.side}</span>
        <span class="sep">·</span><span>${r.amt}</span>
        <span class="chev">›</span>
      </div>
    </article>`;
  }
  function paint(){
    const shown = rows.map((r,i)=>[r,i]).filter(([r])=>filter==="all"||r.v===filter);
    document.getElementById('list').innerHTML = shown.map(([r,i])=>card(r,i)).join("");
    document.getElementById('count').textContent = `${shown.length} shown`;
  }
  function setSeg(el){
    document.querySelectorAll('.seg').forEach(s=>s.classList.remove('active'));
    el.classList.add('active'); filter = el.dataset.v; paint();
  }
  function meterKind(r,which){
    if(which==='impure') return r.impure>5 ? 'warn' : (r.impure>0 ? 'warn':'ok');
    return 'adv';
  }
  function openDetail(i){
    const r = rows[i];
    document.getElementById('d-tk').textContent = r.ticker;
    const badge = document.getElementById('d-badge');
    badge.className = 'badge '+r.v; badge.textContent = vshort[r.v];
    const impureW = Math.min(100, r.impure===0?4:(r.impure/5)*100);
    const debtW = Math.min(100, r.debt===0?4:(r.debt/33)*100);
    document.getElementById('d-body').innerHTML = `
      <div class="d-hero">
        <div class="eyebrow">${r.who} · ${r.sub.split(' · ')[1]||r.sub}</div>
        <div class="d-big">${r.ticker}</div>
        <div class="d-co">${r.co}</div>
        <div class="d-line">
          <span class="side ${r.side==='Sell'?'sell':''}">Disclosed ${r.side}</span>
          <span class="sep">·</span><span>${r.amt}</span>
          <span class="sep">·</span><span>trade ${r.tdate}</span>
        </div>
      </div>
 
      <div class="sect">
        <div class="sect-h"><h3>Sharia verdict</h3><em>Framework B · Hanbali</em></div>
        <div class="row"><small>Business activity</small><span class="vchip ${r.bizS}">${r.bizS==='fail'?'Excluded':r.bizS==='watch'?'Permitted · watch':'Permitted'}</span></div>
        <div class="meter-row">
          <div class="meter-top"><small>Impure income</small><b>${r.impure.toFixed(1)}% <span class="adv-tag">/ ≤5%</span></b></div>
          <div class="meter"><i class="${r.impure>5?'warn':r.impure>0?'warn':'ok'}" style="width:${impureW}%"></i></div>
        </div>
        <div class="meter-row">
          <div class="meter-top"><small>Debt / market cap</small><b>${r.debt===0?'N/A':r.debt.toFixed(1)+'%'} <span class="adv-tag">/ advisory</span></b></div>
          <div class="meter"><i class="adv" style="width:${debtW}%"></i></div>
        </div>
        <div class="why">${r.why}</div>
      </div>
 
      <div class="sect">
        <div class="sect-h"><h3>Disclosure</h3></div>
        <div class="facts">
          <div class="fact"><small>Filed by</small><b>${r.who}</b></div>
          <div class="fact"><small>Source</small><b>${r.sub.split(' · ')[1]||r.sub}</b></div>
          <div class="fact"><small>Side</small><b>Disclosed ${r.side}</b></div>
          <div class="fact"><small>Amount</small><b>${r.amt}</b></div>
          <div class="fact"><small>Trade date</small><b>${r.tdate}</b></div>
          <div class="fact"><small>Filing received</small><b>${r.fdate}</b></div>
        </div>
      </div>
 
      <p class="disc">Mizān provides informational disclosure monitoring and Sharia screening only — not investment advice, brokerage, or a fatwa.</p>
    `;
    document.getElementById('detail').classList.add('open');
    document.getElementById('tag').textContent = 'Concept · Detail';
    document.getElementById('d-body').scrollTop = 0;
  }
  function closeDetail(){
    document.getElementById('detail').classList.remove('open');
    document.getElementById('tag').textContent = 'Concept · Home';
  }
  function openSheet(){ document.getElementById('scrim').classList.add('open'); document.getElementById('sheet').classList.add('open'); }
  function closeSheet(){ document.getElementById('scrim').classList.remove('open'); document.getElementById('sheet').classList.remove('open'); }
  document.querySelectorAll('.chips').forEach(g=>g.addEventListener('click',e=>{
    if(!e.target.classList.contains('chip'))return;
    g.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
    e.target.classList.add('on');
  }));
  paint();
</script>
</body>
</html>
