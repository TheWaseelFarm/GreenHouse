
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Mizān</title>
<style>
  :root{
    --bg:#0A0F1C;--surface:#111A30;--surface-2:#16223E;--line:rgba(255,255,255,.07);--line-2:rgba(255,255,255,.13);
    --ink:#E6ECF7;--muted:#8D9AB4;--faint:#5C6b86;--gold:#D9B450;--gold-soft:rgba(217,180,80,.14);
    --clean:#3ECB86;--purify:#F3B24A;--fail:#F0625A;
    --clean-soft:rgba(62,203,134,.14);--purify-soft:rgba(243,178,74,.14);--fail-soft:rgba(240,98,90,.14);
    --shadow:0 18px 44px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{background:#05070E;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;justify-content:center;}
  #root{width:100%;display:flex;justify-content:center;}
  .app{width:100%;max-width:460px;height:100dvh;min-height:100dvh;position:relative;overflow:hidden;
    background:radial-gradient(120% 60% at 50% -10%,rgba(217,180,80,.10),transparent 60%),linear-gradient(180deg,#0C1424 0%,#080D18 100%);
    border-left:1px solid var(--line);border-right:1px solid var(--line);}
  .panel{position:absolute;inset:0;display:flex;flex-direction:column;}
  .detail{transform:translateX(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);z-index:25;background:linear-gradient(180deg,#0C1424 0%,#080D18 100%);}
  .detail.open{transform:translateX(0);}
  .topbar{flex:0 0 auto;height:58px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,15,28,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);z-index:20;}
  .brand{display:flex;align-items:center;gap:9px;}
  .mark{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:radial-gradient(circle at 50% 30%,#1c2b4c,#0a1120);border:1px solid rgba(217,180,80,.5);box-shadow:inset 0 0 10px rgba(217,180,80,.15);}
  .brand b{font-size:16px;letter-spacing:.5px;font-weight:800;color:#EBD79A;}
  .top-actions{display:flex;gap:8px;}
  .icon-btn{width:38px;height:38px;border:0;border-radius:11px;display:grid;place-items:center;background:rgba(255,255,255,.05);color:var(--ink);cursor:pointer;font-size:15px;border:1px solid var(--line);}
  .icon-btn:active{transform:scale(.94);}
  .scroll{flex:1;min-height:0;overflow-y:auto;scrollbar-width:none;}
  .scroll::-webkit-scrollbar{display:none;}
  .hero{padding:18px 16px 6px;}
  .eyebrow{display:flex;align-items:center;justify-content:space-between;color:var(--faint);font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;}
  .hero h1{margin:9px 0 2px;font-size:30px;font-weight:820;letter-spacing:-.8px;}
  .hero h1 span{color:var(--muted);font-size:15px;font-weight:700;letter-spacing:0;}
  .balance{margin-top:16px;}
  .balance-track{height:14px;border-radius:8px;overflow:hidden;display:flex;background:var(--surface);border:1px solid var(--line);position:relative;}
  .balance-track i{display:block;height:100%;}
  .b-clean{background:linear-gradient(90deg,#34b978,#43d692);}
  .b-purify{background:linear-gradient(90deg,#e7a63b,#f6bd5a);}
  .b-fail{background:linear-gradient(90deg,#e15750,#f26f68);}
  .fulcrum{position:absolute;top:-4px;bottom:-4px;left:50%;width:2px;transform:translateX(-50%);background:rgba(255,255,255,.28);border-radius:2px;}
  .legend{margin-top:12px;display:flex;gap:16px;}
  .legend div{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);font-weight:650;}
  .legend b{color:var(--ink);font-weight:820;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .dot.c{background:var(--clean);}.dot.p{background:var(--purify);}.dot.f{background:var(--fail);}
  .segment{position:sticky;top:0;z-index:15;padding:14px 16px 12px;background:linear-gradient(180deg,rgba(10,15,28,.96),rgba(10,15,28,.82));backdrop-filter:blur(10px);display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
  .segment::-webkit-scrollbar{display:none;}
  .seg{flex:0 0 auto;padding:9px 15px;border-radius:999px;border:1px solid var(--line-2);background:var(--surface);color:var(--muted);font-size:13px;font-weight:750;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap;transition:.15s;}
  .seg .dot{width:8px;height:8px;}
  .seg.active{color:#0A0F1C;background:var(--ink);border-color:var(--ink);}
  .seg.active.clean{background:var(--clean);border-color:var(--clean);}
  .seg.active.purify{background:var(--purify);border-color:var(--purify);}
  .seg.active.fail{background:var(--fail);border-color:var(--fail);}
  .list-head{padding:6px 18px 10px;display:flex;align-items:baseline;justify-content:space-between;}
  .list-head h2{font-size:13px;font-weight:800;letter-spacing:.3px;color:var(--muted);text-transform:uppercase;}
  .list-head span{font-size:12px;color:var(--faint);font-weight:650;}
  .list{padding:0 14px 26px;display:flex;flex-direction:column;gap:10px;}
  .card{position:relative;border-radius:20px;padding:15px 15px 14px 18px;background:linear-gradient(180deg,var(--surface),#0F1830);border:1px solid var(--line);cursor:pointer;transition:transform .14s,border-color .14s;}
  .card:active{transform:scale(.985);border-color:var(--line-2);}
  .card::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;background:var(--faint);}
  .card.clean::before{background:var(--clean);}.card.purify::before{background:var(--purify);}.card.fail::before{background:var(--fail);}
  .c-top{display:flex;align-items:center;gap:10px;}
  .avatar{width:34px;height:34px;border-radius:10px;flex:0 0 auto;display:grid;place-items:center;font-size:11px;font-weight:820;color:var(--muted);background:var(--surface-2);border:1px solid var(--line-2);}
  .avatar.fund{color:var(--gold);background:var(--gold-soft);border-color:rgba(217,180,80,.3);}
  .c-who{min-width:0;flex:1;}
  .c-who b{display:block;font-size:13px;font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .c-who span{font-size:11.5px;color:var(--faint);}
  .c-time{font-size:11.5px;color:var(--faint);font-weight:650;flex:0 0 auto;}
  .c-mid{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-top:12px;}
  .c-ticker{font-size:25px;font-weight:850;letter-spacing:-.8px;line-height:1;}
  .c-co{margin-top:4px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px;}
  .badge{flex:0 0 auto;padding:8px 12px;border-radius:12px;font-size:12px;font-weight:820;display:flex;align-items:center;gap:6px;white-space:nowrap;}
  .badge.clean{color:var(--clean);background:var(--clean-soft);}.badge.purify{color:var(--purify);background:var(--purify-soft);}.badge.fail{color:var(--fail);background:var(--fail-soft);}
  .c-meta{margin-top:13px;padding-top:12px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center;font-size:11.5px;color:var(--muted);font-weight:600;}
  .side{padding:4px 9px;border-radius:8px;background:var(--surface-2);border:1px solid var(--line-2);font-weight:750;font-size:11px;letter-spacing:.2px;color:var(--ink);}
  .side.sell{color:var(--gold);background:var(--gold-soft);border-color:rgba(217,180,80,.25);}
  .sep{color:var(--faint);}
  .chev{margin-left:auto;color:var(--faint);font-size:15px;}
  .tabs{flex:0 0 auto;height:74px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(4,1fr);gap:4px;background:rgba(9,13,24,.92);backdrop-filter:blur(16px);border-top:1px solid var(--line);z-index:20;}
  .tab{border:0;background:transparent;color:var(--faint);display:grid;place-items:center;gap:3px;font-size:10.5px;font-weight:750;cursor:pointer;border-radius:14px;}
  .tab .ti{font-size:18px;line-height:1;}
  .tab.active{color:var(--gold);}
  .scrim{position:absolute;inset:0;background:rgba(4,7,14,.6);opacity:0;pointer-events:none;transition:.2s;z-index:30;}
  .scrim.open{opacity:1;pointer-events:auto;}
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:31;transform:translateY(100%);transition:transform .26s cubic-bezier(.32,.72,0,1);background:linear-gradient(180deg,#13203A,#0C1424);border-top:1px solid var(--line-2);border-radius:26px 26px 0 0;padding:10px 18px calc(20px + env(safe-area-inset-bottom));box-shadow:var(--shadow);}
  .sheet.open{transform:translateY(0);}
  .grab{width:40px;height:4px;border-radius:3px;background:var(--line-2);margin:4px auto 14px;}
  .sheet h3{margin:0 0 4px;font-size:17px;font-weight:820;}
  .sheet .sub{margin:0 0 16px;font-size:12.5px;color:var(--muted);}
  .field{height:44px;border-radius:13px;background:var(--surface);border:1px solid var(--line-2);display:flex;align-items:center;gap:9px;padding:0 13px;color:var(--faint);margin-bottom:16px;}
  .field input{border:0;background:transparent;color:var(--ink);width:100%;outline:0;font-size:14px;}
  .flabel{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--faint);margin:0 0 8px;}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .chip{padding:9px 14px;border-radius:999px;background:var(--surface);border:1px solid var(--line-2);color:var(--muted);font-size:12.5px;font-weight:700;cursor:pointer;}
  .chip.on{color:#0A0F1C;background:var(--gold);border-color:var(--gold);}
  .apply{width:100%;height:50px;border:0;border-radius:15px;background:var(--gold);color:#1a1204;font-size:15px;font-weight:850;cursor:pointer;margin-top:4px;}
  .d-head{flex:0 0 auto;height:58px;padding:0 8px 0 6px;display:flex;align-items:center;gap:6px;background:rgba(10,15,28,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);z-index:20;}
  .back{width:44px;height:44px;border:0;background:transparent;color:var(--ink);font-size:26px;cursor:pointer;border-radius:12px;}
  .back:active{background:rgba(255,255,255,.06);}
  .d-head .d-tk{font-size:15px;font-weight:820;letter-spacing:-.2px;}
  .d-head .badge{margin-left:auto;margin-right:6px;padding:6px 11px;font-size:11.5px;}
  .d-scroll{flex:1;min-height:0;overflow-y:auto;scrollbar-width:none;padding:16px 16px 30px;}
  .d-scroll::-webkit-scrollbar{display:none;}
  .d-big{font-size:42px;font-weight:860;letter-spacing:-1.4px;line-height:1;margin-top:8px;}
  .d-co{margin-top:6px;color:var(--muted);font-size:14px;}
  .d-line{margin-top:14px;display:flex;gap:8px;align-items:center;font-size:12.5px;color:var(--muted);font-weight:600;flex-wrap:wrap;}
  .sect{margin-top:18px;border-radius:20px;background:var(--surface);border:1px solid var(--line);overflow:hidden;}
  .sect-h{padding:14px 16px 4px;display:flex;align-items:center;justify-content:space-between;}
  .sect-h h3{font-size:14px;font-weight:820;letter-spacing:.2px;margin:0;}
  .sect-h em{font-style:normal;color:var(--faint);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;}
  .row{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:14px;border-top:1px solid var(--line);}
  .row.first{border-top:0;}
  .row small{color:var(--muted);font-size:12.5px;font-weight:650;}
  .row b{font-size:13px;font-weight:750;}
  .vchip{padding:6px 11px;border-radius:9px;font-size:11.5px;font-weight:800;}
  .vchip.pass{color:var(--clean);background:var(--clean-soft);}.vchip.watch{color:var(--purify);background:var(--purify-soft);}.vchip.fail{color:var(--fail);background:var(--fail-soft);}
  .meter-row{padding:13px 16px;border-top:1px solid var(--line);}
  .meter-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .meter-top small{color:var(--muted);font-size:12.5px;font-weight:650;}
  .meter-top b{font-size:13px;font-weight:800;}
  .meter{height:8px;border-radius:6px;background:var(--surface-2);overflow:hidden;}
  .meter i{display:block;height:100%;border-radius:6px;}
  .meter i.ok{background:var(--clean);}.meter i.warn{background:var(--purify);}.meter i.adv{background:linear-gradient(90deg,#5b6b90,#8391b0);}
  .adv-tag{color:var(--faint);font-size:11px;font-weight:700;}
  .why{padding:14px 16px 16px;border-top:1px solid var(--line);color:var(--muted);font-size:13px;line-height:1.55;}
  .facts{padding:6px 16px 14px;display:grid;grid-template-columns:1fr 1fr;gap:14px 12px;}
  .fact small{display:block;color:var(--faint);font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;}
  .fact b{display:block;margin-top:4px;font-size:13px;font-weight:750;}
  .disc{margin-top:16px;color:var(--faint);font-size:11px;line-height:1.5;text-align:center;padding:0 8px;}
  .page{padding:18px 16px 26px;}
  .page h2{font-size:22px;font-weight:840;letter-spacing:-.5px;margin:0 0 4px;}
  .page .note{color:var(--muted);font-size:13px;line-height:1.5;margin:0 0 16px;}
  .tracker{display:flex;align-items:center;gap:12px;padding:14px;border-radius:18px;background:var(--surface);border:1px solid var(--line);margin-bottom:10px;}
  .tracker .c-who{flex:1;}
  .toggle{width:48px;height:29px;border-radius:999px;background:var(--surface-2);border:1px solid var(--line-2);padding:3px;cursor:pointer;flex:0 0 auto;}
  .toggle i{display:block;width:21px;height:21px;border-radius:50%;background:#7c88a3;transition:.18s;}
  .toggle.on{background:var(--gold);border-color:var(--gold);}
  .toggle.on i{transform:translateX(19px);background:#1a1204;}
  .vcard{padding:14px;border-radius:18px;background:var(--surface);border:1px solid var(--line);margin-bottom:10px;}
  .vcard .vh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .vcard p{margin:0;color:var(--muted);font-size:12.5px;line-height:1.5;}
  .loading{padding:40px 16px;text-align:center;color:var(--faint);font-size:13px;}
  .empty{margin:0 14px;padding:30px 16px;text-align:center;color:var(--muted);border:1px dashed var(--line-2);border-radius:20px;font-size:13px;}
</style>
</head>
<body>
  <div id="root"></div>
<script type="module">
import React, { useState, useEffect } from "https://esm.sh/react@18.2.0";
import { createRoot } from "https://esm.sh/react-dom@18.2.0/client";
import htmModule from "https://esm.sh/htm@3.1.1";
const html = htmModule.bind(React.createElement);
 
/* ---------- Framework B engine (mirror of the backend module) ---------- */
const FB = { impureMax: 5, debtAdvisory: 33 };
function classifyFB(t){
  const impure = Number(t.impurePct ?? 0), debt = Number(t.debtRatio ?? 0), b = t.businessStatus ?? "watch";
  if (b === "fail" || impure > FB.impureMax) return "fail";
  if (b === "pass" && impure === 0 && debt <= FB.debtAdvisory) return "clean";
  return "purify";
}
const VSHORT = { clean:"Clean", purify:"Purify", fail:"Fail" };
 
/* ---------- sample data (used only if /api/feed is unavailable) ---------- */
const SAMPLE = [
  {id:1,actor:"Renaissance Technologies",kind:"13F Fund",initials:"RT",source:"13F-HR",side:"BUY",ticker:"NVDA",company:"NVIDIA Corp.",amount:"$15K–$50K",transactionDate:"Jun 17, 2026",filingDate:"Jun 25, 2026",businessStatus:"pass",business:"Hardware, chips, AI infrastructure",impurePct:0,debtRatio:3.2,reasoning:"Permissible technology business with no impure income and low debt. A clean buy — nothing to purify at sale."},
  {id:2,actor:"Public Official Filing",kind:"Congress",initials:"PO",source:"House PTR",side:"BUY",ticker:"AVGO",company:"Broadcom Inc.",amount:"$50K–$100K",transactionDate:"Jun 15, 2026",filingDate:"Jun 24, 2026",businessStatus:"watch",business:"Semiconductors & infrastructure software",impurePct:1.4,debtRatio:19,reasoning:"Core business permissible; a small slice of revenue is non-operating income. Buyable as Purify-at-sale."},
  {id:3,actor:"Global Value Fund",kind:"13F Fund",initials:"GV",source:"13F-HR",side:"SELL",ticker:"JPM",company:"JPMorgan Chase & Co.",amount:"$50K–$100K",transactionDate:"Jun 11, 2026",filingDate:"Jun 23, 2026",businessStatus:"fail",business:"Conventional interest-based banking",impurePct:71,debtRatio:0,reasoning:"Excluded at the business-activity level: conventional banking and interest income are core to the model."},
  {id:4,actor:"Public Official Filing",kind:"Congress",initials:"PO",source:"House PTR",side:"SELL",ticker:"XOM",company:"Exxon Mobil Corp.",amount:"$15K–$50K",transactionDate:"Jun 02, 2026",filingDate:"Jun 17, 2026",businessStatus:"pass",business:"Energy production",impurePct:0,debtRatio:52,reasoning:"Permissible energy business, no impure income. Debt is above the advisory reference — but debt is advisory only under Framework B, so it stays Purify-at-sale, not Fail."},
];
 
const isFund = t => (t.kind||"").toLowerCase().includes("fund");
const sideLabel = s => "Disclosed " + (String(s).toUpperCase()==="SELL" ? "Sell" : "Buy");
const srcLabel = t => t.source || (t.kind==="Congress" ? "Officials" : "Funds");
 
/* ---------- small components ---------- */
function Balance({trades}){
  const total = trades.length || 1;
  const c = trades.filter(t=>t.label==="clean").length;
  const p = trades.filter(t=>t.label==="purify").length;
  const f = trades.filter(t=>t.label==="fail").length;
  const w = n => (n/total*100);
  return html`
    <div class="hero">
      <div class="eyebrow"><span>Today</span><span>Screened live</span></div>
      <h1>${trades.length} <span>disclosures</span></h1>
      <div class="balance">
        <div class="balance-track">
          <i class="b-clean" style=${{width:w(c)+"%"}}></i>
          <i class="b-purify" style=${{width:w(p)+"%"}}></i>
          <i class="b-fail" style=${{width:w(f)+"%"}}></i>
          <span class="fulcrum"></span>
        </div>
        <div class="legend">
          <div><span class="dot c"></span><b>${c}</b> Clean</div>
          <div><span class="dot p"></span><b>${p}</b> Purify</div>
          <div><span class="dot f"></span><b>${f}</b> Fail</div>
        </div>
      </div>
    </div>`;
}
 
function Card({t,onOpen}){
  return html`
    <article class=${"card "+t.label} onClick=${onOpen}>
      <div class="c-top">
        <div class=${"avatar "+(isFund(t)?"fund":"")}>${t.initials||"·"}</div>
        <div class="c-who"><b>${t.actor}</b><span>${srcLabel(t)}</span></div>
        <div class="c-time">${t.filingDate||""}</div>
      </div>
      <div class="c-mid">
        <div><div class="c-ticker">${t.ticker}</div><div class="c-co">${t.company||t.ticker}</div></div>
        <div class=${"badge "+t.label}>${VSHORT[t.label]}</div>
      </div>
      <div class="c-meta">
        <span class=${"side "+(String(t.side).toUpperCase()==="SELL"?"sell":"")}>${sideLabel(t.side)}</span>
        <span class="sep">·</span><span>${t.amount||"—"}</span>
        <span class="chev">›</span>
      </div>
    </article>`;
}
 
function Detail({t,onClose}){
  const open = !!t;
  const impureW = t ? Math.min(100, t.impurePct===0?4:(Number(t.impurePct)/5)*100) : 0;
  const debtW = t ? Math.min(100, Number(t.debtRatio)===0?4:(Number(t.debtRatio)/33)*100) : 0;
  const bizS = t ? (t.businessStatus||"watch") : "watch";
  const bizText = bizS==="fail"?"Excluded":bizS==="watch"?"Permitted · watch":"Permitted";
  return html`
    <div class=${"panel detail "+(open?"open":"")}>
      <div class="d-head">
        <button class="back" onClick=${onClose} aria-label="Back">‹</button>
        <span class="d-tk">${t?t.ticker:""}</span>
        ${t && html`<span class=${"badge "+t.label}>${VSHORT[t.label]}</span>`}
      </div>
      ${t && html`
      <div class="d-scroll">
        <div class="eyebrow" style=${{textTransform:"none",letterSpacing:"0"}}>${t.actor} · ${srcLabel(t)}</div>
        <div class="d-big">${t.ticker}</div>
        <div class="d-co">${t.company||t.ticker}</div>
        <div class="d-line">
          <span class=${"side "+(String(t.side).toUpperCase()==="SELL"?"sell":"")}>${sideLabel(t.side)}</span>
          <span class="sep">·</span><span>${t.amount||"—"}</span>
          <span class="sep">·</span><span>trade ${t.transactionDate||"—"}</span>
        </div>
 
        <div class="sect">
          <div class="sect-h"><h3>Sharia verdict</h3><em>Framework B · Hanbali</em></div>
          <div class="row first"><small>Business activity</small><span class=${"vchip "+bizS}>${bizText}</span></div>
          <div class="meter-row">
            <div class="meter-top"><small>Impure income</small><b>${Number(t.impurePct).toFixed(1)}% <span class="adv-tag">/ ≤5%</span></b></div>
            <div class="meter"><i class=${Number(t.impurePct)>0?"warn":"ok"} style=${{width:impureW+"%"}}></i></div>
          </div>
          <div class="meter-row">
            <div class="meter-top"><small>Debt / market cap</small><b>${Number(t.debtRatio)===0?"N/A":Number(t.debtRatio).toFixed(1)+"%"} <span class="adv-tag">/ advisory</span></b></div>
            <div class="meter"><i class="adv" style=${{width:debtW+"%"}}></i></div>
          </div>
          <div class="why">${t.reasoning||"—"}</div>
        </div>
 
        <div class="sect">
          <div class="sect-h"><h3>Disclosure</h3></div>
          <div class="facts">
            <div class="fact"><small>Filed by</small><b>${t.actor}</b></div>
            <div class="fact"><small>Source</small><b>${srcLabel(t)}</b></div>
            <div class="fact"><small>Side</small><b>${sideLabel(t.side)}</b></div>
            <div class="fact"><small>Amount</small><b>${t.amount||"—"}</b></div>
            <div class="fact"><small>Trade date</small><b>${t.transactionDate||"—"}</b></div>
            <div class="fact"><small>Filing received</small><b>${t.filingDate||"—"}</b></div>
          </div>
        </div>
 
        <p class="disc">Mizān provides informational disclosure monitoring and Sharia screening only — not investment advice, brokerage, or a fatwa.</p>
      </div>`}
    </div>`;
}
 
function FilterSheet({open,onClose}){
  const groups = [["Trade side",["All","Buy","Sell"]],["Source",["All","Officials","Funds"]],["Sort by",["Newest","Amount"]]];
  const [sel,setSel] = useState({0:0,1:0,2:0});
  return html`
    <div>
      <div class=${"scrim "+(open?"open":"")} onClick=${onClose}></div>
      <div class=${"sheet "+(open?"open":"")}>
        <div class="grab"></div>
        <h3>Filter & sort</h3>
        <p class="sub">Narrow the feed. Verdict is set by the pills above.</p>
        <div class="field"><span>⌕</span><input placeholder="Search ticker, company, or source" /></div>
        ${groups.map((g,gi)=>html`
          <div key=${gi}>
            <p class="flabel">${g[0]}</p>
            <div class="chips">
              ${g[1].map((c,ci)=>html`<span key=${ci} class=${"chip "+(sel[gi]===ci?"on":"")} onClick=${()=>setSel({...sel,[gi]:ci})}>${c}</span>`)}
            </div>
          </div>`)}
        <button class="apply" onClick=${onClose}>Show results</button>
      </div>
    </div>`;
}
 
function Watchlist(){
  const init = [
    {name:"Renaissance Technologies",sub:"Institutional · 13F",init:"RT",fund:true,on:true},
    {name:"Public Official Filing",sub:"Officials · House & Senate",init:"PO",fund:false,on:true},
    {name:"Berkshire Crest Fund",sub:"Institutional · 13F",init:"BC",fund:true,on:true},
    {name:"Northstar Quant Partners",sub:"Institutional · 13F",init:"NQ",fund:true,on:false},
  ];
  const [items,setItems] = useState(init);
  const toggle = i => setItems(items.map((x,k)=>k===i?{...x,on:!x.on}:x));
  return html`
    <div class="scroll"><div class="page">
      <h2>Watchlist</h2>
      <p class="note">Choose the expert and institutional sources you want alerts from.</p>
      ${items.map((x,i)=>html`
        <div class="tracker" key=${i}>
          <div class=${"avatar "+(x.fund?"fund":"")}>${x.init}</div>
          <div class="c-who"><b>${x.name}</b><span>${x.sub} · ${x.on?"Alerts on":"Paused"}</span></div>
          <div class=${"toggle "+(x.on?"on":"")} onClick=${()=>toggle(i)}><i></i></div>
        </div>`)}
    </div></div>`;
}
 
function Verdicts({trades}){
  const c = trades.filter(t=>t.label==="clean").length;
  const p = trades.filter(t=>t.label==="purify").length;
  const f = trades.filter(t=>t.label==="fail").length;
  const rows = [
    ["clean","Clean","Permissible business with no impure income — nothing to purify."],
    ["purify","Purify-at-sale","Buyable, but a purification amount applies at sale (non-zero impure income, or debt over the advisory level)."],
    ["fail","Fail","Impermissible business activity, or impure income above 5%."],
  ];
  return html`
    <div class="scroll"><div class="page">
      <h2>Verdicts</h2>
      <p class="note">How every disclosed security is screened before it reaches your alerts — Framework B (Hanbali).</p>
      <div class="balance" style=${{marginBottom:"18px"}}>
        <div class="legend" style=${{marginTop:0}}>
          <div><span class="dot c"></span><b>${c}</b> Clean</div>
          <div><span class="dot p"></span><b>${p}</b> Purify</div>
          <div><span class="dot f"></span><b>${f}</b> Fail</div>
        </div>
      </div>
      ${rows.map((r,i)=>html`
        <div class="vcard" key=${i}>
          <div class="vh"><b style=${{fontSize:"14px"}}>${r[1]}</b><span class=${"badge "+r[0]}>${VSHORT[r[0]]}</span></div>
          <p>${r[2]}</p>
        </div>`)}
      <div class="vcard">
        <div class="vh"><b style=${{fontSize:"14px"}}>Debt is advisory</b></div>
        <p>Debt-to-market-cap never fails a name on its own; it only moves it to Purify-at-sale. Business activity and impure income are the two disqualifying tests.</p>
      </div>
    </div></div>`;
}
 
function Settings(){
  return html`
    <div class="scroll"><div class="page">
      <h2>Settings</h2>
      <p class="note">Mizān is dark-first and English for now; Arabic (RTL) is on the roadmap.</p>
      <div class="vcard"><div class="vh"><b style=${{fontSize:"14px"}}>Methodology</b></div>
        <p>Framework B · Hanbali. Permissible activity required; impure income ≤ 5%; debt advisory only.</p></div>
      <div class="vcard"><div class="vh"><b style=${{fontSize:"14px"}}>Disclaimer</b></div>
        <p>Mizān provides informational disclosure monitoring and Sharia screening only. It is not investment advice, a brokerage service, or a formal fatwa.</p></div>
    </div></div>`;
}
 
const TABS = [["alerts","◈","Alerts"],["watchlist","◎","Watchlist"],["verdicts","✓","Verdicts"],["settings","☰","Settings"]];
 
function App(){
  const [trades,setTrades] = useState(null);
  const [tab,setTab] = useState("alerts");
  const [filter,setFilter] = useState("all");
  const [selected,setSelected] = useState(null);
  const [sheet,setSheet] = useState(false);
 
  useEffect(()=>{
    let alive = true;
    fetch("/api/feed",{headers:{accept:"application/json"}})
      .then(r=>r.ok?r.json():Promise.reject())
      .then(data=>{
        const rows = Array.isArray(data)?data:(data&&data.disclosures)||[];
        if(alive) setTrades((rows.length?rows:SAMPLE).map(t=>({...t,label:classifyFB(t)})));
      })
      .catch(()=>{ if(alive) setTrades(SAMPLE.map(t=>({...t,label:classifyFB(t)}))); });
    return ()=>{alive=false;};
  },[]);
 
  const loaded = trades!==null;
  const all = trades||[];
  const shown = all.filter(t=>filter==="all"||t.label===filter);
 
  const Alerts = html`
    <div class="panel">
      <div class="topbar">
        <div class="brand">
          <div class="mark">
            <svg viewBox="0 0 48 48" width="19" height="19" aria-hidden="true">
              <defs><linearGradient id="mzg" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#B98E2C"/><stop offset="1" stop-color="#F0D483"/></linearGradient></defs>
              <path d="M9 39 V15 L24 31 L39 15 V39" fill="none" stroke="url(#mzg)" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M33 7.4 l1.2 2.8 2.8 1.2 -2.8 1.2 L33 16.6 l-1.2 -2.8 -2.8 -1.2 2.8 -1.2 Z" fill="#F3E2B0"/>
            </svg>
          </div><b>Mizān</b>
        </div>
        <div class="top-actions">
          <button class="icon-btn" onClick=${()=>setSheet(true)} aria-label="Filter">⚙</button>
          <button class="icon-btn" aria-label="Notifications">🔔</button>
        </div>
      </div>
      <div class="scroll">
        ${!loaded ? html`<div class="loading">Loading disclosures…</div>` : html`
          <${Balance} trades=${all} />
          <div class="segment">
            ${[["all","All"],["clean","Clean"],["purify","Purify"],["fail","Fail"]].map(s=>html`
              <button key=${s[0]} class=${"seg "+s[0]+" "+(filter===s[0]?"active":"")} onClick=${()=>setFilter(s[0])}>
                ${s[0]!=="all" && html`<span class=${"dot "+s[0][0]}></span>`}${s[1]}
              </button>`)}
          </div>
          <div class="list-head"><h2>Latest disclosures</h2><span>${shown.length} shown</span></div>
          ${shown.length ? html`<div class="list">${shown.map(t=>html`<${Card} key=${t.id||t.ticker+t.filingDate} t=${t} onOpen=${()=>setSelected(t)} />`)}</div>`
            : html`<div class="empty">No disclosures match this filter yet.</div>`}
        `}
      </div>
    </div>`;
 
  return html`
    <div class="app">
      ${tab==="alerts" ? Alerts
        : tab==="watchlist" ? html`<div class="panel"><${Watchlist}/></div>`
        : tab==="verdicts" ? html`<div class="panel"><${Verdicts} trades=${all}/></div>`
        : html`<div class="panel"><${Settings}/></div>`}
 
      <nav class="tabs">
        ${TABS.map(x=>html`
          <button key=${x[0]} class=${"tab "+(tab===x[0]?"active":"")} onClick=${()=>setTab(x[0])}>
            <span class="ti">${x[1]}</span>${x[2]}
          </button>`)}
      </nav>
 
      <${Detail} t=${selected} onClose=${()=>setSelected(null)} />
      <${FilterSheet} open=${sheet} onClose=${()=>setSheet(false)} />
    </div>`;
}
 
createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>
