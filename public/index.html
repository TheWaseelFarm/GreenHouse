<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al-Waseel Farm — Greenhouse Monitor</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f0a; font-family: 'Segoe UI', sans-serif; color: #c0d0c0; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 0.5px solid #1e3a1e; }
    .header-left h1 { font-size: 22px; font-weight: 500; color: #a8e6a3; }
    .header-left p { font-size: 13px; color: #4a7a4a; margin-top: 3px; direction: rtl; }
    .live-badge { display: inline-flex; align-items: center; gap: 6px; background: #0d1f0d; border: 0.5px solid #1e4a1e; border-radius: 20px; padding: 5px 12px; font-size: 12px; color: #4caf50; }
    .live-dot { width: 7px; height: 7px; background: #4caf50; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .time-label { font-size: 11px; color: #3a5a3a; margin-top: 6px; text-align: right; }
    .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
    .metric-card { background: #0d1a0d; border: 0.5px solid #1a3a1a; border-radius: 16px; padding: 20px 18px; position: relative; overflow: hidden; }
    .metric-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
