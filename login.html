<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>تسجيل الدخول — Al-Waseel Farm</title>
  <style>
    :root{
      --deep:#06442E; --forest:#032D21; --sage:#8FAF7A; --gold:#C49A3A;
      --light-gold:#E6D3A3; --cream:#F8F4EA; --card:#FFFDF7; --muted:#6F765F;
      --danger:#C0392B; --soft-danger:#FDECEA;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      font-family:Tahoma,'Segoe UI',Arial,sans-serif;
      background:linear-gradient(160deg,var(--forest),var(--deep));
      color:#1E2D1A; padding:24px;
    }
    .card{
      width:100%; max-width:380px; background:var(--card);
      border-radius:20px; padding:32px 28px;
      box-shadow:0 24px 60px rgba(0,0,0,.35);
      border:1px solid rgba(196,154,58,.35);
    }
    .brand{text-align:center; margin-bottom:22px}
    .brand-ar{font-size:26px; font-weight:800; color:var(--deep)}
    .brand-en{font-size:12px; letter-spacing:4px; color:var(--gold); font-weight:700; margin-top:4px}
    .brand-sub{font-size:12px; color:var(--muted); margin-top:6px}
    .divider{height:4px; width:64px; margin:14px auto 0;
      background:linear-gradient(90deg,var(--gold),var(--light-gold)); border-radius:3px}
    h1{font-size:17px; text-align:center; margin:22px 0 18px; color:var(--forest)}
    label{display:block; font-size:13px; font-weight:600; margin:14px 0 6px; color:var(--muted)}
    input{
      width:100%; padding:12px 14px; font-size:15px; border-radius:12px;
      border:1px solid #d8dccf; background:#fff; color:#1E2D1A; outline:none;
    }
    input:focus{border-color:var(--sage); box-shadow:0 0 0 3px rgba(143,175,122,.25)}
    button{
      width:100%; margin-top:22px; padding:13px; font-size:15px; font-weight:700;
      color:#fff; background:var(--deep); border:none; border-radius:12px; cursor:pointer;
      transition:background .15s;
    }
    button:hover{background:var(--forest)}
    button:disabled{opacity:.6; cursor:default}
    .error{
      display:none; margin-top:16px; padding:11px 14px; font-size:13px;
      color:var(--danger); background:var(--soft-danger);
      border:1px solid rgba(192,57,43,.3); border-radius:10px; text-align:center;
    }
    .error.show{display:block}
    .foot{text-align:center; font-size:11px; color:var(--muted); margin-top:20px}
    .or{display:flex; align-items:center; gap:10px; margin:20px 0 4px}
    .or .line{flex:1; height:1px; background:#e6e2d3}
    .or span{font-size:11px; color:#9aa088}
    .ghost{
      width:100%; margin-top:0; padding:11px; font-size:14px; font-weight:700;
      color:var(--deep); background:transparent; border:1px solid var(--gold); border-radius:12px;
    }
    .ghost:hover{background:#faf4e4}
    #reqForm{display:none; margin-top:16px}
    #reqForm textarea{
      width:100%; padding:12px 14px; font-size:15px; border-radius:12px;
      border:1px solid #d8dccf; background:#fff; color:#1E2D1A; outline:none; resize:vertical;
      font-family:inherit;
    }
    #reqForm textarea:focus{border-color:var(--sage); box-shadow:0 0 0 3px rgba(143,175,122,.25)}
    #reqBtn{background:var(--gold); color:var(--deep)}
    #reqBtn:hover{background:#b98f34}
    .msg{display:none; margin-top:14px; padding:11px 14px; font-size:13px; border-radius:10px; text-align:center}
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <div class="brand-ar">مزرعة الوصيل</div>
      <div class="brand-en">AL-WASEEL FARM</div>
      <div class="brand-sub">الدرعية · الرياض</div>
      <div class="divider"></div>
    </div>

    <h1>تسجيل الدخول — Sign In</h1>

    <form id="loginForm" autocomplete="on">
      <label for="username">اسم المستخدم — Username</label>
      <input id="username" name="username" type="text" required autocomplete="username" autofocus dir="ltr">

      <label for="password">كلمة المرور — Password</label>
      <input id="password" name="password" type="password" required autocomplete="current-password" dir="ltr">

      <button id="submitBtn" type="submit">دخول — Enter</button>
      <div class="error" id="error"></div>
    </form>

    <div class="or"><div class="line"></div><span>أو — OR</span><div class="line"></div></div>
    <button id="reqOpenBtn" type="button" class="ghost">طلب صلاحية الدخول — Request Access</button>

    <form id="reqForm" autocomplete="on">
      <label for="reqName">الاسم — Name</label>
      <input id="reqName" name="name" type="text" required>

      <label for="reqEmail">البريد الإلكتروني — Email</label>
      <input id="reqEmail" name="email" type="email" required autocomplete="email" dir="ltr">

      <label for="reqNote">ملاحظة (اختياري) — Note (optional)</label>
      <textarea id="reqNote" name="note" rows="2"></textarea>

      <button id="reqBtn" type="submit">إرسال الطلب — Send Request</button>
      <div class="msg" id="reqMsg"></div>
    </form>

    <div class="foot">لوحة مراقبة البيئة المحمية — Greenhouse Monitor</div>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('submitBtn');
    const errorBox = document.getElementById('error');

    function showError(msg){
      errorBox.textContent = msg;
      errorBox.classList.add('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('show');
      btn.disabled = true;
      btn.textContent = '...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ username, password }),
        });

        if (res.ok) {
          window.location.href = '/';
          return;
        }

        let msg = 'تعذر تسجيل الدخول — Sign in failed';
        try { const d = await res.json(); if (d && d.error) msg = d.error; } catch (_) {}
        if (res.status === 429) msg = 'محاولات كثيرة، حاول بعد قليل — Too many attempts, try again later';
        showError(msg);
      } catch (_) {
        showError('تعذر الاتصال بالخادم — Could not reach the server');
      } finally {
        btn.disabled = false;
        btn.textContent = 'دخول — Enter';
      }
    });

    // ── Request access ──────────────────────────────────────────────────────
    const reqOpen = document.getElementById('reqOpenBtn');
    const reqForm = document.getElementById('reqForm');
    const reqBtn  = document.getElementById('reqBtn');
    const reqMsg  = document.getElementById('reqMsg');

    reqOpen.addEventListener('click', () => {
      const open = reqForm.style.display === 'none' || !reqForm.style.display;
      reqForm.style.display = open ? 'block' : 'none';
      reqOpen.textContent = open ? 'إخفاء — Hide' : 'طلب صلاحية الدخول — Request Access';
      if (open) document.getElementById('reqName').focus();
    });

    reqForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      reqMsg.style.display = 'none';
      reqBtn.disabled = true;
      reqBtn.textContent = '...';
      const show = (text, ok) => {
        reqMsg.textContent = text;
        reqMsg.style.color = ok ? '#1E5631' : 'var(--danger)';
        reqMsg.style.background = ok ? '#EAF6EE' : 'var(--soft-danger)';
        reqMsg.style.border = '1px solid ' + (ok ? 'rgba(30,86,49,.3)' : 'rgba(192,57,43,.3)');
        reqMsg.style.display = 'block';
      };
      try {
        const res = await fetch('/api/auth/request-access', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('reqName').value.trim(),
            email: document.getElementById('reqEmail').value.trim(),
            note: document.getElementById('reqNote').value.trim(),
          }),
        });
        if (res.ok) {
          reqForm.reset();
          show('تم إرسال طلبك، سيتم مراجعته — Request sent, it will be reviewed', true);
        } else {
          let msg = 'تعذّر إرسال الطلب — Could not send request';
          try { const d = await res.json(); if (d && d.error) msg = d.error; } catch (_) {}
          if (res.status === 429) msg = 'طلبات كثيرة، حاول لاحقاً — Too many requests, try later';
          show(msg, false);
        }
      } catch (_) {
        show('تعذر الاتصال بالخادم — Could not reach the server', false);
      } finally {
        reqBtn.disabled = false;
        reqBtn.textContent = 'إرسال الطلب — Send Request';
      }
    });
  </script>
</body>
</html>
