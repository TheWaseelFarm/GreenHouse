<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>تسجيل الدخول — Al-Waseel Farm</title>
  <style>
    :root{
      --deep:#06442E; --forest:#032D21; --sage:#8FAF7A; --gold:#C49A3A;
      --light-gold:#E6D3A3; --cream:#F8F4EA; --card:#FFFDF7; --muted:#6F765F;
      --danger:#C0392B; --soft-danger:#FDECEA;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      font-family:Tahoma,'Segoe UI',Arial,sans-serif;
      background:linear-gradient(160deg,var(--forest),var(--deep));
      color:#1E2D1A; padding:24px;
    }
    .card{
      width:100%; max-width:380px; background:var(--card);
      border-radius:20px; padding:32px 28px;
      box-shadow:0 24px 60px rgba(0,0,0,.35);
      border:1px solid rgba(196,154,58,.35);
    }
    .brand{text-align:center; margin-bottom:22px}
    .brand-ar{font-size:26px; font-weight:800; color:var(--deep)}
    .brand-en{font-size:12px; letter-spacing:4px; color:var(--gold); font-weight:700; margin-top:4px}
    .brand-sub{font-size:12px; color:var(--muted); margin-top:6px}
    .divider{height:4px; width:64px; margin:14px auto 0;
      background:linear-gradient(90deg,var(--gold),var(--light-gold)); border-radius:3px}
    h1{font-size:17px; text-align:center; margin:22px 0 18px; color:var(--forest)}
    label{display:block; font-size:13px; font-weight:600; margin:14px 0 6px; color:var(--muted)}
    input{
      width:100%; padding:12px 14px; font-size:15px; border-radius:12px;
      border:1px solid #d8dccf; background:#fff; color:#1E2D1A; outline:none;
    }
    input:focus{border-color:var(--sage); box-shadow:0 0 0 3px rgba(143,175,122,.25)}
    button{
      width:100%; margin-top:22px; padding:13px; font-size:15px; font-weight:700;
      color:#fff; background:var(--deep); border:none; border-radius:12px; cursor:pointer;
      transition:background .15s;
    }
    button:hover{background:var(--forest)}
    button:disabled{opacity:.6; cursor:default}
    .error{
      display:none; margin-top:16px; padding:11px 14px; font-size:13px;
      color:var(--danger); background:var(--soft-danger);
      border:1px solid rgba(192,57,43,.3); border-radius:10px; text-align:center;
    }
    .error.show{display:block}
    .foot{text-align:center; font-size:11px; color:var(--muted); margin-top:20px}
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <div class="brand-ar">مزرعة الوصيل</div>
      <div class="brand-en">AL-WASEEL FARM</div>
      <div class="brand-sub">الدرعية · الرياض</div>
      <div class="divider"></div>
    </div>

    <h1>تسجيل الدخول — Sign In</h1>

    <form id="loginForm" autocomplete="on">
      <label for="username">اسم المستخدم — Username</label>
      <input id="username" name="username" type="text" required autocomplete="username" autofocus dir="ltr">

      <label for="password">كلمة المرور — Password</label>
      <input id="password" name="password" type="password" required autocomplete="current-password" dir="ltr">

      <button id="submitBtn" type="submit">دخول — Enter</button>
      <div class="error" id="error"></div>
    </form>

    <div class="foot">لوحة مراقبة البيئة المحمية — Greenhouse Monitor</div>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('submitBtn');
    const errorBox = document.getElementById('error');

    function showError(msg){
      errorBox.textContent = msg;
      errorBox.classList.add('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('show');
      btn.disabled = true;
      btn.textContent = '...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ username, password }),
        });

        if (res.ok) {
          window.location.href = '/';
          return;
        }

        let msg = 'تعذر تسجيل الدخول — Sign in failed';
        try { const d = await res.json(); if (d && d.error) msg = d.error; } catch (_) {}
        if (res.status === 429) msg = 'محاولات كثيرة، حاول بعد قليل — Too many attempts, try again later';
        showError(msg);
      } catch (_) {
        showError('تعذر الاتصال بالخادم — Could not reach the server');
      } finally {
        btn.disabled = false;
        btn.textContent = 'دخول — Enter';
      }
    });
  </script>
</body>
</html>
